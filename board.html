<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STORYBOARD — Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;600;700&display=swap');
:root{
  --bg:#0e0e10;--surface:#18181c;--surface2:#222228;--border:#2a2a32;
  --text:#e8e6e3;--muted:#6b6b78;--muted2:#44444e;
  --accent:#c8f04d;--accent2:#4dc8f0;--danger:#ff4455;
  --mono:'JetBrains Mono','SF Mono',monospace;
  --sans:'Noto Sans KR',-apple-system,sans-serif;
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
::selection{background:#c8f04d44}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(14,14,16,.92);backdrop-filter:blur(12px);z-index:100}
.header-left{display:flex;align-items:center;gap:12px;flex-shrink:1;overflow:hidden}
.back-btn{display:inline-flex;align-items:center;gap:6px;font:600 12px/1 var(--sans);color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:6px;transition:all .12s;white-space:nowrap}
.back-btn:hover{color:var(--text);background:var(--surface2)}
.logo{font:700 15px/1 var(--mono);letter-spacing:.15em;color:var(--accent);text-transform:uppercase}
.proj-name{font:600 14px/1 var(--sans);color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stats{font:400 11px/1 var(--mono);color:var(--muted);background:var(--surface2);padding:3px 10px;border-radius:4px;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;font:600 13px/1 var(--sans);border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;cursor:pointer;transition:all .12s;background:var(--surface2);color:var(--text);white-space:nowrap}
.btn:hover{border-color:var(--muted)}
.btn-accent{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn-accent:hover{filter:brightness(1.1)}
.btn-drive{background:#1a73e8;color:#fff;border-color:#1a73e8;font-size:12px;padding:6px 12px}
.btn-drive:hover{filter:brightness(1.1)}
.btn-drive.connected{background:#0d652d;border-color:#0d652d}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{background:none;border:none;color:var(--muted);padding:4px 6px;cursor:pointer;display:inline-flex;align-items:center;border-radius:4px;transition:color .1s}
.btn-icon:hover{color:var(--text)}
.btn-icon.danger:hover{color:var(--danger)}
.config-bar{display:flex;align-items:center;gap:10px;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.config-bar label{font:600 11px/1 var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.config-bar input{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;font:13px/1.4 var(--mono);color:var(--text);outline:none}
.config-bar input:focus{border-color:var(--accent)}
.config-bar .hint{font:11px/1.4 var(--mono);color:var(--muted)}
.board{padding:20px 24px 80px}
.scene{margin-bottom:20px;border:1px solid var(--border);border-radius:12px;background:var(--surface);overflow:hidden;transition:border-color .15s,opacity .15s}
.scene.scene-dragging{opacity:.35}
.scene.scene-drag-over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(200,240,77,.2)}
.scene-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
.scene-title-wrap{display:flex;align-items:center;gap:10px}
.scene-num{font:700 14px/1 var(--mono);color:var(--accent)}
.scene-title-input{background:transparent;border:1px solid transparent;border-radius:4px;padding:4px 8px;font:600 14px/1.3 var(--sans);color:var(--text);outline:none;min-width:200px}
.scene-title-input:hover{border-color:var(--border)}
.scene-title-input:focus{border-color:var(--accent);background:var(--surface)}
.scene-actions{display:flex;gap:4px}
.scene-drag-handle{cursor:grab;padding:4px 6px;color:var(--muted);display:flex;align-items:center;border-radius:4px;transition:color .1s;user-select:none}
.scene-drag-handle:active{cursor:grabbing}
.scene-drag-handle:hover{color:var(--text)}
.move-popup{position:absolute;bottom:100%;right:0;margin-bottom:4px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:160px;overflow:hidden}
.move-popup-title{font:600 10px/1 var(--mono);color:var(--muted);padding:8px 12px 4px;text-transform:uppercase;letter-spacing:.05em}
.move-popup-item{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);font:400 12px/1.4 var(--sans);padding:7px 12px;cursor:pointer;transition:background .1s}
.move-popup-item:hover{background:var(--surface2);color:var(--accent)}
.cuts{display:flex;gap:0;padding:12px;overflow-x:auto;min-height:180px;scroll-behavior:smooth}
.cuts.wrap-mode{flex-wrap:wrap;overflow-x:visible;gap:8px}
.cuts.wrap-mode .cut{margin-right:0}
.cut{flex-shrink:0;width:220px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:grab;transition:border-color .12s,box-shadow .12s,opacity .15s;display:flex;flex-direction:column;overflow:hidden;position:relative;margin-right:8px}
.cut:active{cursor:grabbing}
.cut.dragging{opacity:.4}
.cut.drag-left::before,.cut.drag-right::after{content:'';position:absolute;top:0;bottom:0;width:3px;background:var(--accent);border-radius:2px;z-index:5}
.cut.drag-left::before{left:-5px}
.cut.drag-right::after{right:-5px}
.cut-num{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid var(--border)}
.cut-num-text{font:700 12px/1 var(--mono);color:var(--accent)}
.cut-dur{font:400 10px/1 var(--mono);color:var(--accent2);background:rgba(77,200,240,.1);padding:2px 6px;border-radius:3px}
.cut-upload{font:400 9px/1 var(--mono);color:#7abaff;background:rgba(26,115,232,.1);padding:2px 5px;border-radius:3px}
.cut-thumb{width:100%;aspect-ratio:16/9;background:var(--surface2);overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.cut-thumb img{width:100%;height:100%;object-fit:cover}
.cut-thumb .placeholder{color:var(--muted);font-size:11px;text-align:center;line-height:1.4;pointer-events:none}
.cut-thumb.img-drag-over{outline:2px solid var(--accent);outline-offset:-2px;background:rgba(200,240,77,.08)}
.cut-thumb:hover .thumb-overlay{opacity:1}
.thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.cut-body{padding:8px 10px;flex:1;display:flex;flex-direction:column;gap:4px}
.cut-badges{display:flex;gap:4px;flex-wrap:wrap}
.badge-angle{font:600 10px/1 var(--mono);color:var(--accent);background:rgba(200,240,77,.1);padding:2px 6px;border-radius:3px}
.badge-move{font:600 10px/1 var(--mono);color:var(--accent2);background:rgba(77,200,240,.1);padding:2px 6px;border-radius:3px}
.cut-action{font:400 11px/1.5 var(--sans);color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cut-dialogue{font:italic 11px/1.4 var(--sans);color:var(--muted)}
.cut-footer{display:flex;justify-content:flex-end;gap:2px;padding:4px 6px;border-top:1px solid var(--border);position:relative}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:640px;max-height:90vh;overflow:auto;display:flex;flex-direction:column}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-header h2{font:700 16px/1.3 var(--sans)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-img-wrap{width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--surface2);position:relative;cursor:pointer}
.modal-img-wrap img{width:100%;height:100%;object-fit:contain;background:#000}
.modal-img-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:12px;gap:6px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.form-label{display:flex;flex-direction:column;gap:4px}
.form-label span{font:400 11px/1 var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.form-label input,.form-label textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font:13px/1.4 var(--sans);color:var(--text);outline:none;resize:vertical}
.form-label input:focus,.form-label textarea:focus{border-color:var(--accent)}
.form-full{grid-column:1/-1}
.modal-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-top:1px solid var(--border)}
.preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:24px}
.preview-overlay img{max-width:95%;max-height:95%;object-fit:contain;border-radius:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:8px 22px;border-radius:8px;font:600 13px/1 var(--mono);z-index:500;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:toastIn .25s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:16px}
.empty p{color:var(--muted);font-size:14px}
.loading-bar{position:fixed;top:0;left:0;height:3px;background:var(--accent2);z-index:999;animation:loadAnim 1.5s ease infinite}
@keyframes loadAnim{0%{width:0}50%{width:60%}100%{width:100%;opacity:0}}
@media(max-width:600px){.form-grid{grid-template-columns:1fr 1fr}.cut{width:180px}.header{flex-wrap:wrap;gap:8px}}
</style>
</head>
<body>
<div id="app"></div>

<script>
const CLIENT_ID='10428481224-0326ltmibbchkk05juarqqk5kkb31q3u.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.file';
const DISCOVERY_DOC='https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const PARAMS=new URLSearchParams(location.search);
const PROJECT_ID=PARAMS.get('project');

const STATE={projectName:'',projectColor:'',driveFolderId:'',baseFolder:'./images',scenes:[],editCut:null,editSceneId:null,previewImg:null,toast:null,drag:null,sceneDrag:null,movePopup:null,wrapMode:false,loading:false};
const uid=()=>Math.random().toString(36).slice(2,10);
let gapiReady=false,gisReady=false,tokenClient=null,driveConnected=false;
let sceneFolderIds={};

// ── Google API ──
function loadGapi(){return new Promise(res=>{if(window.gapi){gapi.load('client',async()=>{await gapi.client.init({discoveryDocs:[DISCOVERY_DOC]});gapiReady=true;res()});return}const s=document.createElement('script');s.src='https://apis.google.com/js/api.js';s.onload=()=>{gapi.load('client',async()=>{await gapi.client.init({discoveryDocs:[DISCOVERY_DOC]});gapiReady=true;res()})};document.head.appendChild(s)})}
function loadGis(){return new Promise(res=>{if(window.google?.accounts?.oauth2){initTokenClient();gisReady=true;res();return}const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=()=>{initTokenClient();gisReady=true;res()};document.head.appendChild(s)})}
function initTokenClient(){tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:async resp=>{if(resp.error) return;driveConnected=true;localStorage.setItem('sb-drive-connected','1');render();showToast('☁ Drive 연결 완료')}})}
function connectDrive(){if(!gapiReady||!gisReady){showToast('API 로딩 중...');return}tokenClient.requestAccessToken({prompt:'consent'})}
function disconnectDrive(){const token=gapi.client.getToken();if(token){google.accounts.oauth2.revoke(token.access_token);gapi.client.setToken(null)}driveConnected=false;localStorage.removeItem('sb-drive-connected');render();showToast('Drive 연결 해제')}

// ── Drive ops ──
async function findOrCreateFolder(name,parentId){
  if(!driveConnected||!parentId) return null;
  try{const resp=await gapi.client.drive.files.list({q:`name='${name.replace(/'/g,"\\'")}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id)',spaces:'drive'});if(resp.result.files&&resp.result.files.length>0) return resp.result.files[0].id}catch(e){}
  try{const resp=await gapi.client.drive.files.create({resource:{name,mimeType:'application/vnd.google-apps.folder',parents:[parentId]},fields:'id'});return resp.result.id}catch(e){return null}
}
async function ensureProjectFolder(){
  if(!driveConnected) return null;
  if(STATE.driveFolderId){try{const r=await gapi.client.drive.files.get({fileId:STATE.driveFolderId,fields:'id,trashed'});if(!r.result.trashed) return STATE.driveFolderId}catch(e){}}
  let rootId=localStorage.getItem('sb-root-folder-id');
  if(rootId){try{await gapi.client.drive.files.get({fileId:rootId,fields:'id,trashed'})}catch(e){rootId=null}}
  if(!rootId){try{const r=await gapi.client.drive.files.list({q:`name='Storyboard_Projects' and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id)',spaces:'drive'});if(r.result.files&&r.result.files.length>0) rootId=r.result.files[0].id}catch(e){}}
  if(!rootId){try{const r=await gapi.client.drive.files.create({resource:{name:'Storyboard_Projects',mimeType:'application/vnd.google-apps.folder'},fields:'id'});rootId=r.result.id}catch(e){return null}}
  localStorage.setItem('sb-root-folder-id',rootId);
  const projName=(STATE.projectName||PROJECT_ID||'Untitled').replace(/[\/\\:*?"<>|]/g,'_');
  const fId=await findOrCreateFolder(projName,rootId);
  if(fId){STATE.driveFolderId=fId;try{const raw=localStorage.getItem('sb-projects');if(raw){const ps=JSON.parse(raw);const p=ps.find(x=>x.id===PROJECT_ID);if(p){p.driveFolderId=fId;localStorage.setItem('sb-projects',JSON.stringify(ps))}}}catch(e){}}
  return fId;
}
async function getSceneFolderId(sceneIdx){
  if(!driveConnected) return null;const pf=await ensureProjectFolder();if(!pf) return null;
  const sn='Scene_'+String(sceneIdx+1).padStart(2,'0');const sid=STATE.scenes[sceneIdx]?.id;if(!sid) return null;
  if(sceneFolderIds[sid]) return sceneFolderIds[sid];
  const fId=await findOrCreateFolder(sn,pf);if(fId) sceneFolderIds[sid]=fId;return fId;
}
async function uploadImageToDrive(file,fileName,folderId){
  if(!driveConnected||!folderId) return null;
  try{const metadata={name:fileName,parents:[folderId]};const form=new FormData();form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));form.append('file',file);
  const token=gapi.client.getToken().access_token;const resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+token},body:form});
  const data=await resp.json();if(data.id){try{await gapi.client.drive.permissions.create({fileId:data.id,resource:{role:'reader',type:'anyone'}})}catch(e){}return data.id}}catch(e){console.error('Upload error:',e)}return null;
}
async function deleteDriveFile(fileId){if(!driveConnected||!fileId) return;try{await gapi.client.drive.files.delete({fileId});console.log('Drive file deleted:',fileId)}catch(e){console.warn('Drive delete error:',e)}}
function driveImgUrl(fileId){return fileId?'https://lh3.googleusercontent.com/d/'+fileId:''}

// ── IndexedDB ──
const DB_NAME='sb-images-db',DB_STORE='images';let _db=null;
function openDB(){return new Promise((res,rej)=>{if(_db) return res(_db);const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>{e.target.result.createObjectStore(DB_STORE)};r.onsuccess=e=>{_db=e.target.result;res(_db)};r.onerror=e=>rej(e)})}
function idbPut(k,v){return openDB().then(db=>new Promise(res=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(v,k);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false)})).catch(()=>false)}
function idbGet(k){return openDB().then(db=>new Promise(res=>{const tx=db.transaction(DB_STORE,'readonly');const r=tx.objectStore(DB_STORE).get(k);r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null)})).catch(()=>null)}
function idbDelete(k){return openDB().then(db=>new Promise(res=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).delete(k);tx.oncomplete=()=>res();tx.onerror=()=>res()})).catch(()=>{})}
function idbPutBatch(entries){if(!entries.length) return Promise.resolve();return openDB().then(db=>new Promise(res=>{const tx=db.transaction(DB_STORE,'readwrite');const s=tx.objectStore(DB_STORE);entries.forEach(({key,value})=>s.put(value,key));tx.oncomplete=()=>res(true);tx.onerror=()=>res(false)})).catch(()=>false)}

// ── Persistence ──
const storageKey=PROJECT_ID?'sb-data-'+PROJECT_ID:'sb-local-v1';
const imgPrefix=PROJECT_ID?'sb-img-'+PROJECT_ID+'-':'sb-img-';
let _saveQ=null;
async function saveData(){
  try{const stripped={baseFolder:STATE.baseFolder,wrapMode:STATE.wrapMode,sceneFolderIds,scenes:STATE.scenes.map(sc=>({...sc,cuts:sc.cuts.map(({imgData,...rest})=>rest)}))};localStorage.setItem(storageKey,JSON.stringify(stripped))}catch(e){}
  const entries=[];STATE.scenes.forEach(sc=>sc.cuts.forEach(cut=>{if(cut.imgData) entries.push({key:imgPrefix+cut.id,value:cut.imgData})}));if(entries.length) await idbPutBatch(entries);
  if(PROJECT_ID){try{const raw=localStorage.getItem('sb-projects');if(raw){const ps=JSON.parse(raw);const p=ps.find(x=>x.id===PROJECT_ID);if(p){p.updatedAt=new Date().toISOString().slice(0,10);p.cutCount=STATE.scenes.reduce((s,sc)=>s+sc.cuts.length,0);localStorage.setItem('sb-projects',JSON.stringify(ps))}}}catch(e){}}
}
function saveDataDebounced(){clearTimeout(_saveQ);_saveQ=setTimeout(()=>saveData(),300)}
async function loadData(){
  if(PROJECT_ID){try{const raw=localStorage.getItem('sb-projects');if(raw){const ps=JSON.parse(raw);const p=ps.find(x=>x.id===PROJECT_ID);if(p){STATE.projectName=p.name||'';STATE.projectColor=p.color||'';STATE.driveFolderId=p.driveFolderId||''}}}catch(e){}}
  try{const raw=localStorage.getItem(storageKey);if(raw){const d=JSON.parse(raw);if(d.baseFolder) STATE.baseFolder=d.baseFolder;if(d.wrapMode!==undefined) STATE.wrapMode=d.wrapMode;if(d.sceneFolderIds) sceneFolderIds=d.sceneFolderIds;if(d.scenes){STATE.scenes=d.scenes;await openDB();for(const sc of STATE.scenes){for(const cut of sc.cuts){const img=await idbGet(imgPrefix+cut.id);if(img) cut.imgData=img}}}}}catch(e){}
  try{const me=[];for(const sc of STATE.scenes){for(const cut of sc.cuts){if(!cut.imgData){const old=localStorage.getItem('sb-img-'+cut.id);if(old){cut.imgData=old;me.push({key:imgPrefix+cut.id,value:old});localStorage.removeItem('sb-img-'+cut.id)}}}}if(me.length) await idbPutBatch(me)}catch(e){}
}

function convertDriveUrl(url){if(!url) return '';const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);if(m) return 'https://lh3.googleusercontent.com/d/'+m[1];return url}
function imgSrc(f){if(!f) return '';if(f.startsWith('http')||f.startsWith('data:')||f.startsWith('/')||f.startsWith('.')) return f;return STATE.baseFolder.replace(/\/+$/,'')+'/'+f}
function resolveImg(cut){if(cut.driveFileId) return driveImgUrl(cut.driveFileId);if(cut.driveUrl) return convertDriveUrl(cut.driveUrl);if(cut.imgData) return cut.imgData;if(cut.img) return imgSrc(cut.img);return ''}
function cutLabel(si,ci){return `S${si+1}-C${String(ci+1).padStart(2,'0')}`}

// ── RENDER ──
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  if(STATE.loading) app.appendChild(el('div',{className:'loading-bar'}));
  app.appendChild(renderHeader());app.appendChild(renderConfigBar());
  if(STATE.scenes.length===0) app.appendChild(renderEmpty());
  else{const board=el('div',{className:'board'});STATE.scenes.forEach((sc,si)=>board.appendChild(renderScene(sc,si)));app.appendChild(board)}
  if(STATE.editCut) app.appendChild(renderEditModal());
  if(STATE.previewImg) app.appendChild(renderPreview());
  if(STATE.toast) app.appendChild(renderToast());
  if(STATE.movePopup){const close=e=>{if(!e.target.closest('.move-popup')&&!e.target.closest('.btn-icon[title="다른 씬으로 이동"]')){STATE.movePopup=null;render()}document.removeEventListener('click',close)};setTimeout(()=>document.addEventListener('click',close),0)}
}

function el(tag,attrs,...ch){const e=document.createElement(tag);if(attrs) Object.entries(attrs).forEach(([k,v])=>{if(k==='className') e.className=v;else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='style'&&typeof v==='object') Object.assign(e.style,v);else e.setAttribute(k,v)});ch.flat().forEach(c=>{if(c!=null) e.appendChild(typeof c==='string'?document.createTextNode(c):c)});return e}
