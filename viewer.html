<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STORYBOARD — Cinematic Viewer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;600;700&display=swap');
:root{
  --bg:#0a0a0c;--s:#121216;--s2:#1a1a20;--b:#2a2a32;
  --tx:#e8e6e3;--m:#6b6b78;--m2:#44444e;
  --acc:#c8f04d;--acc2:#4dc8f0;--danger:#ff4455;
  --mono:'JetBrains Mono','SF Mono',monospace;
  --sans:'Noto Sans KR',-apple-system,sans-serif;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;border:none;background:none;color:var(--tx);font-family:var(--sans);}
::selection{background:rgba(200,240,77,.2);}

/* HEADER */
.v-header{display:flex;align-items:center;gap:12px;padding:12px 24px;background:rgba(18,18,22,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100;}
.v-header .back{padding:6px 12px;border-radius:var(--r);background:var(--s2);font-size:13px;display:flex;align-items:center;gap:4px;}
.v-header .back:hover{background:var(--b);}
.v-header .title{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:2px;color:var(--acc2);}
.v-header .proj-name{font-size:13px;color:var(--m);font-family:var(--mono);}
.v-header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.btn-v{padding:6px 14px;border-radius:var(--r);background:var(--s2);font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;border:1px solid var(--b);transition:all .15s;}
.btn-v:hover{background:var(--b);}
.btn-v.drive{border-color:var(--acc2);color:var(--acc2);}
.btn-v.drive.connected{background:rgba(77,200,240,.15);}
.btn-v.accent{background:var(--acc);color:#000;border-color:var(--acc);}
.btn-v.accent:hover{background:#d4f75a;}
.btn-v.pdf{background:#e74c3c;color:#fff;border-color:#e74c3c;}
.btn-v.pdf:hover{filter:brightness(1.15);}

/* STATUS */
.v-status{display:flex;align-items:center;gap:12px;padding:8px 24px;background:var(--s);border-bottom:1px solid var(--b);font-size:11px;color:var(--m);font-family:var(--mono);}
.v-status .drive-st{margin-left:auto;}
.v-status .drive-st.on{color:var(--acc2);}

/* CINEMATIC VIEW */
.cinema{padding:20px 24px;}
.scene-block{margin-bottom:32px;}
.scene-title-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--b);}
.scene-title-bar .num{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--acc);letter-spacing:1px;}
.scene-title-bar .stitle{font-size:14px;color:var(--tx);font-weight:600;}
.scene-title-bar .scount{font-size:11px;color:var(--m);font-family:var(--mono);margin-left:auto;}

/* CUT ROW — cinematic style */
.cut-row{display:flex;gap:16px;margin-bottom:20px;padding:16px;background:var(--s);border:1px solid var(--b);border-radius:12px;transition:border-color .2s;}
.cut-row:hover{border-color:var(--m);}
.cut-row .img-wrap{width:320px;min-width:320px;aspect-ratio:16/9;background:var(--s2);border-radius:8px;overflow:hidden;position:relative;}
.cut-row .img-wrap img{width:100%;height:100%;object-fit:cover;}
.cut-row .img-wrap .no-img{display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--m2);font-family:var(--mono);font-size:12px;}
.cut-row .cut-info{flex:1;display:flex;flex-direction:column;gap:8px;}
.cut-row .cut-header{display:flex;align-items:center;gap:10px;}
.cut-row .cut-label{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--acc2);}
.cut-row .cut-label .cloud{color:var(--acc2);margin-left:4px;font-size:11px;}
.cut-row .cut-badges{display:flex;gap:6px;flex-wrap:wrap;}
.cut-badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;background:var(--s2);border:1px solid var(--b);color:var(--m);}
.cut-badge.angle{color:var(--acc);border-color:rgba(200,240,77,.2);}
.cut-badge.cam{color:var(--acc2);border-color:rgba(77,200,240,.2);}
.cut-badge.dur{color:#facc15;border-color:rgba(250,204,21,.2);}
.cut-detail{font-size:12px;color:var(--m);line-height:1.6;}
.cut-detail strong{color:var(--tx);font-weight:600;font-size:11px;font-family:var(--mono);display:inline-block;min-width:50px;}

/* GRID MODE */
.cinema.grid-mode .scene-cuts{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.cinema.grid-mode .cut-row{flex-direction:column;padding:0;overflow:hidden;}
.cinema.grid-mode .cut-row .img-wrap{width:100%;min-width:unset;}
.cinema.grid-mode .cut-row .cut-info{padding:12px;gap:6px;}

/* FULLSCREEN OVERLAY */
.fullscreen-bg{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.fullscreen-bg img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;}
.fullscreen-close{position:fixed;top:20px;right:20px;z-index:301;font-size:24px;color:#fff;background:rgba(0,0,0,.5);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
.fullscreen-nav{position:fixed;top:50%;z-index:301;transform:translateY(-50%);font-size:32px;color:#fff;background:rgba(0,0,0,.5);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;}
.fullscreen-nav.prev{left:20px;}
.fullscreen-nav.next{right:20px;}
.fullscreen-label{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:301;font-family:var(--mono);font-size:14px;color:var(--acc);background:rgba(0,0,0,.7);padding:8px 20px;border-radius:8px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--b);padding:10px 24px;border-radius:var(--r);font-size:13px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* LOADING */
.loading-bar{position:fixed;top:0;left:0;height:3px;background:var(--acc2);z-index:999;transition:width .3s;width:0;}

/* PDF PREP — hidden print style */
@media print{
  body{background:#fff !important;color:#000 !important;}
  .v-header,.v-status,.btn-v,.toast,.loading-bar,.fullscreen-bg{display:none !important;}
  .cut-row{break-inside:avoid;border:1px solid #ddd !important;background:#fff !important;}
  .cut-badge{border:1px solid #ccc !important;color:#333 !important;background:#f5f5f5 !important;}
  .cut-label{color:#0066cc !important;}
  .scene-title-bar .num{color:#333 !important;}
}

@media(max-width:768px){
  .cut-row{flex-direction:column;}
  .cut-row .img-wrap{width:100%;min-width:unset;}
  .v-header{flex-wrap:wrap;gap:8px;}
}
</style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───
const CLIENT_ID='10428481224-0326ltmibbchkk05juarqqk5kkb31q3u.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.file';
const DISCOVERY_DOC='https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const ROOT_FOLDER_NAME='Storyboard_Projects';

// ─── STATE ───
const params=new URLSearchParams(location.search);
const projectId=params.get('project')||'default';
const storageKey=`sb-data-${projectId}`;
const imgPrefix=`sb-img-${projectId}-`;

let STATE={scenes:[],viewMode:'list',projectName:'',projectDriveId:'',projectColor:'#4dc8f0'};
let driveConnected=false;
let rootFolderId='';
let gapiLoaded=false;
let gisLoaded=false;
let tokenClient=null;
let fullscreenCut=null; // {sceneIdx, cutIdx}
let allCutsFlat=[]; // for navigation

// ─── IndexedDB ───
const DB_NAME='storyboardDB';const DB_VER=1;let db=null;
function idbOpen(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{e.target.result.createObjectStore('images')};req.onsuccess=e=>{db=e.target.result;res(db)};req.onerror=e=>rej(e)})}
function idbGet(key){return new Promise((res,rej)=>{const tx=db.transaction('images','readonly');const req=tx.objectStore('images').get(key);req.onsuccess=()=>res(req.result||null);req.onerror=e=>rej(e)})}

// ─── DATA ───
function loadProject(){
  const proj=JSON.parse(localStorage.getItem('sb-projects')||'[]').find(p=>p.id===projectId);
  if(proj){STATE.projectName=proj.name||'';STATE.projectDriveId=proj.driveFolderId||proj.driveId||'';STATE.projectColor=proj.color||'#4dc8f0';}
  const raw=localStorage.getItem(storageKey);
  if(raw){try{const d=JSON.parse(raw);STATE.scenes=d.scenes||[];STATE.viewMode=d.viewMode||'list';}catch(e){STATE.scenes=[];}}
}

// ─── GOOGLE DRIVE ───
function loadGapi(){const s=document.createElement('script');s.src='https://apis.google.com/js/api.js';s.onload=()=>{gapi.load('client',async()=>{await gapi.client.init({discoveryDocs:[DISCOVERY_DOC]});gapiLoaded=true;tryAutoReconnect()})};document.body.appendChild(s)}
function loadGis(){const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=()=>{tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:handleTokenResponse});gisLoaded=true;tryAutoReconnect()};document.body.appendChild(s)}
function handleTokenResponse(resp){if(resp.error){console.error('Token error:',resp);return;}const td={access_token:resp.access_token,expires_at:Date.now()+(resp.expires_in*1000)};localStorage.setItem('sb-drive-token',JSON.stringify(td));driveConnected=true;showToast('☁ Drive 연결 완료');syncDriveImages().then(()=>render())}
function tryAutoReconnect(){if(!gapiLoaded||!gisLoaded)return;const saved=localStorage.getItem('sb-drive-token');if(!saved)return;try{const td=JSON.parse(saved);if(td.expires_at>Date.now()+60000){gapi.client.setToken({access_token:td.access_token});driveConnected=true;syncDriveImages().then(()=>render())}else{localStorage.removeItem('sb-drive-token');tokenClient.requestAccessToken({prompt:''})}}catch(e){localStorage.removeItem('sb-drive-token')}}
function connectDrive(){if(!gapiLoaded||!gisLoaded){showToast('API 로딩 중...');return}tokenClient.requestAccessToken({prompt:'consent'})}
function disconnectDrive(){const token=gapi.client.getToken();if(token)google.accounts.oauth2.revoke(token.access_token);gapi.client.setToken(null);localStorage.removeItem('sb-drive-token');driveConnected=false;showToast('Drive 연결 해제');render()}

// ─── SYNC DRIVE IMAGES (for cross-device) ───
async function syncDriveImages(){
  if(!driveConnected||!STATE.projectDriveId)return;
  showLoading(20);
  try{
    // List scene folders
    const res=await gapi.client.drive.files.list({
      q:`'${STATE.projectDriveId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
      fields:'files(id,name)',spaces:'drive',orderBy:'name'
    });
    const sceneFolders=res.result.files||[];
    showLoading(40);
    let updated=0;
    for(const sf of sceneFolders){
      // List images in each scene folder
      const imgs=await gapi.client.drive.files.list({
        q:`'${sf.id}' in parents and mimeType contains 'image/' and trashed=false`,
        fields:'files(id,name)',spaces:'drive',orderBy:'name'
      });
      const files=imgs.result.files||[];
      // Match to cuts by label
      const sceneMatch=sf.name.match(/Scene_(\d+)/i);
      if(!sceneMatch)continue;
      const sceneIdx=parseInt(sceneMatch[1])-1;
      if(sceneIdx<0||sceneIdx>=STATE.scenes.length)continue;
      const scene=STATE.scenes[sceneIdx];
      for(const file of files){
        // Try to match file name to cut label
        for(const cut of scene.cuts){
          if(!cut.driveUrl&&file.name.startsWith(cut.label)){
            cut.driveFileId=file.id;
            cut.driveUrl=`https://lh3.googleusercontent.com/d/${file.id}`;
            updated++;
          }
        }
      }
    }
    showLoading(100);
    if(updated>0){
      // Save updated data
      const d={scenes:STATE.scenes,viewMode:STATE.viewMode};
      localStorage.setItem(storageKey,JSON.stringify(d));
      showToast(`☁ ${updated}개 이미지 동기화 완료`);
    }
  }catch(e){console.error('Sync error:',e);}
  setTimeout(()=>showLoading(0),500);
}

// ─── UI HELPERS ───
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show';clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',2500)}
function showLoading(pct){document.getElementById('loadingBar').style.width=pct+'%'}
function el(tag,props,...ch){const e=document.createElement(tag);if(props)Object.keys(props).forEach(k=>{if(k==='className')e.className=props[k];else if(k==='style'&&typeof props[k]==='object')Object.assign(e.style,props[k]);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),props[k]);else e.setAttribute(k,props[k])});ch.flat(9).forEach(c=>{if(c==null)return;if(typeof c==='string'||typeof c==='number')e.appendChild(document.createTextNode(c));else e.appendChild(c)});return e}

// ─── PDF EXPORT ───
async function exportPDF(){
  showToast('PDF 생성 중...');
  showLoading(10);
  
  // Build printable HTML
  let html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;color:#111;padding:20px;}
h1{font-size:20px;margin-bottom:4px;}
.subtitle{font-size:12px;color:#666;margin-bottom:24px;font-family:'JetBrains Mono',monospace;}
.scene-title{font:700 14px/1 'JetBrains Mono',monospace;color:#333;margin:24px 0 12px;padding-bottom:6px;border-bottom:2px solid #e0e0e0;}
.cut{display:flex;gap:16px;margin-bottom:16px;padding:12px;border:1px solid #e0e0e0;border-radius:8px;break-inside:avoid;}
.cut img{width:280px;height:158px;object-fit:cover;border-radius:6px;background:#f0f0f0;}
.cut .no-img{width:280px;height:158px;background:#f0f0f0;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px;}
.cut-info{flex:1;}
.cut-label{font:700 14px 'JetBrains Mono',monospace;color:#0066cc;margin-bottom:6px;}
.badges{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.badge{font:600 10px 'JetBrains Mono',monospace;padding:2px 6px;border-radius:4px;background:#f5f5f5;border:1px solid #ddd;color:#555;}
.detail{font-size:11px;color:#444;line-height:1.8;}
.detail strong{display:inline-block;min-width:60px;color:#111;}
.footer{text-align:center;margin-top:32px;font-size:10px;color:#999;font-family:'JetBrains Mono',monospace;}
@media print{.cut{break-inside:avoid;}}
</style></head><body>`;
  
  html+=`<h1>${STATE.projectName||'Storyboard'}</h1>`;
  html+=`<div class="subtitle">${STATE.scenes.length} Scenes · ${STATE.scenes.reduce((a,s)=>a+s.cuts.length,0)} Cuts · Exported ${new Date().toISOString().slice(0,10)}</div>`;
  
  showLoading(30);
  
  for(let si=0;si<STATE.scenes.length;si++){
    const scene=STATE.scenes[si];
    html+=`<div class="scene-title">SCENE ${si+1}${scene.title?' — '+scene.title:''}</div>`;
    for(const cut of scene.cuts){
      html+=`<div class="cut">`;
      let imgSrc='';
      if(cut.driveUrl){
        imgSrc=cut.driveUrl;
      }else{
        const local=await idbGet(imgPrefix+cut.id);
        if(local)imgSrc=local;
      }
      if(imgSrc)html+=`<img src="${imgSrc}" crossorigin="anonymous">`;
      else html+=`<div class="no-img">No Image</div>`;
      
      html+=`<div class="cut-info">`;
      html+=`<div class="cut-label">${cut.label}</div>`;
      html+=`<div class="badges">`;
      if(cut.angle)html+=`<span class="badge">${cut.angle}</span>`;
      if(cut.cameraMove)html+=`<span class="badge">${cut.cameraMove}</span>`;
      if(cut.duration)html+=`<span class="badge">${cut.duration}</span>`;
      html+=`</div>`;
      html+=`<div class="detail">`;
      if(cut.action)html+=`<div><strong>ACTION</strong> ${cut.action}</div>`;
      if(cut.dialogue)html+=`<div><strong>DIALOGUE</strong> ${cut.dialogue}</div>`;
      if(cut.note)html+=`<div><strong>NOTE</strong> ${cut.note}</div>`;
      html+=`</div></div></div>`;
    }
  }
  
  html+=`<div class="footer">Generated by Storyboard App · ${new Date().toISOString().slice(0,10)}</div>`;
  html+=`</body></html>`;
  
  showLoading(70);
  
  // Open in new window for printing
  const win=window.open('','_blank','width=900,height=700');
  win.document.write(html);
  win.document.close();
  
  showLoading(100);
  setTimeout(()=>{
    win.print();
    showLoading(0);
    showToast('PDF 준비 완료 — 인쇄 대화상자에서 "PDF로 저장"을 선택하세요');
  },1000);
}

// ─── FULLSCREEN ───
function buildFlatCuts(){
  allCutsFlat=[];
  STATE.scenes.forEach((sc,si)=>{sc.cuts.forEach((cut,ci)=>{allCutsFlat.push({sceneIdx:si,cutIdx:ci,cut,sceneTitle:sc.title})})});
}
function openFullscreen(sceneIdx,cutIdx){
  buildFlatCuts();
  fullscreenCut=allCutsFlat.findIndex(x=>x.sceneIdx===sceneIdx&&x.cutIdx===cutIdx);
  if(fullscreenCut<0)fullscreenCut=0;
  render();
}
function navFullscreen(dir){
  if(fullscreenCut===null)return;
  fullscreenCut+=dir;
  if(fullscreenCut<0)fullscreenCut=allCutsFlat.length-1;
  if(fullscreenCut>=allCutsFlat.length)fullscreenCut=0;
  render();
}
function closeFullscreen(){fullscreenCut=null;render()}

// ─── RENDER ───
async function render(){
  const app=document.getElementById('app');
  app.innerHTML='';

  // Header
  const totalCuts=STATE.scenes.reduce((a,s)=>a+s.cuts.length,0);
  const driveBtn=el('button',{className:'btn-v drive'+(driveConnected?' connected':''),onClick:driveConnected?disconnectDrive:connectDrive},driveConnected?'☁ 연결됨':'☁ 연결');
  
  const header=el('div',{className:'v-header'},
    el('button',{className:'back',onClick:()=>location.href='index.html'},'← 목록'),
    el('span',{className:'title'},'VIEWER'),
    el('span',{className:'proj-name'},STATE.projectName),
    el('div',{className:'v-header-right'},
      driveBtn,
      el('button',{className:'btn-v',onClick:()=>{STATE.viewMode=STATE.viewMode==='list'?'grid':'list';render()}},STATE.viewMode==='list'?'그리드':'리스트'),
      el('button',{className:'btn-v',onClick:()=>{if(driveConnected)syncDriveImages().then(()=>render());else showToast('Drive를 먼저 연결하세요')}},'↻ 동기화'),
      el('button',{className:'btn-v pdf',onClick:exportPDF},'PDF 내보내기'),
      el('button',{className:'btn-v accent',onClick:()=>location.href=`board.html?project=${projectId}`},'편집 모드')
    )
  );
  app.appendChild(header);

  // Status
  const status=el('div',{className:'v-status'},
    el('span',null,`${STATE.scenes.length} Scenes · ${totalCuts} Cuts`),
    el('span',{className:'drive-st'+(driveConnected?' on':'')},driveConnected?'☁ Drive 이미지 자동 로드':'로컬 이미지만 표시')
  );
  app.appendChild(status);

  // Cinema
  const cinema=el('div',{className:'cinema'+(STATE.viewMode==='grid'?' grid-mode':'')});
  
  for(let si=0;si<STATE.scenes.length;si++){
    const scene=STATE.scenes[si];
    const block=el('div',{className:'scene-block'});
    
    block.appendChild(el('div',{className:'scene-title-bar'},
      el('span',{className:'num'},`SCENE ${si+1}`),
      el('span',{className:'stitle'},scene.title||''),
      el('span',{className:'scount'},`${scene.cuts.length} cuts`)
    ));

    const cutsWrap=el('div',{className:'scene-cuts'});
    
    for(let ci=0;ci<scene.cuts.length;ci++){
      const cut=scene.cuts[ci];
      const row=el('div',{className:'cut-row'});
      
      // Image
      const imgWrap=el('div',{className:'img-wrap',onClick:()=>openFullscreen(si,ci),style:{cursor:'pointer'}});
      const img=el('img',{style:{display:'none'}});
      const noImg=el('div',{className:'no-img'},'No Image');
      imgWrap.appendChild(img);
      imgWrap.appendChild(noImg);
      
      (async(ie,ni,c)=>{
        if(c.driveUrl){ie.src=c.driveUrl;ie.style.display='block';ni.style.display='none';}
        else{const local=await idbGet(imgPrefix+c.id);if(local){ie.src=local;ie.style.display='block';ni.style.display='none';}}
      })(img,noImg,cut);
      
      row.appendChild(imgWrap);

      // Info
      const info=el('div',{className:'cut-info'});
      const hdr=el('div',{className:'cut-header'});
      const label=el('span',{className:'cut-label'},cut.label);
      if(cut.driveFileId)label.appendChild(el('span',{className:'cloud'},'☁'));
      hdr.appendChild(label);
      
      const badges=el('div',{className:'cut-badges'});
      if(cut.angle)badges.appendChild(el('span',{className:'cut-badge angle'},cut.angle));
      if(cut.cameraMove)badges.appendChild(el('span',{className:'cut-badge cam'},cut.cameraMove));
      if(cut.duration)badges.appendChild(el('span',{className:'cut-badge dur'},cut.duration));
      hdr.appendChild(badges);
      info.appendChild(hdr);

      if(cut.action)info.appendChild(el('div',{className:'cut-detail'},el('strong',null,'ACTION '),cut.action));
      if(cut.dialogue)info.appendChild(el('div',{className:'cut-detail'},el('strong',null,'DIALOGUE '),cut.dialogue));
      if(cut.note)info.appendChild(el('div',{className:'cut-detail'},el('strong',null,'NOTE '),cut.note));
      
      row.appendChild(info);
      cutsWrap.appendChild(row);
    }
    block.appendChild(cutsWrap);
    cinema.appendChild(block);
  }
  app.appendChild(cinema);

  // Fullscreen overlay
  if(fullscreenCut!==null&&allCutsFlat[fullscreenCut]){
    const fc=allCutsFlat[fullscreenCut];
    const bg=el('div',{className:'fullscreen-bg',onClick:closeFullscreen});
    const img=el('img');
    
    if(fc.cut.driveUrl){img.src=fc.cut.driveUrl;}
    else{const local=await idbGet(imgPrefix+fc.cut.id);if(local)img.src=local;}
    img.addEventListener('click',e=>e.stopPropagation());
    bg.appendChild(img);
    
    bg.appendChild(el('button',{className:'fullscreen-close',onClick:closeFullscreen},'×'));
    bg.appendChild(el('button',{className:'fullscreen-nav prev',onClick:e=>{e.stopPropagation();navFullscreen(-1)}},'‹'));
    bg.appendChild(el('button',{className:'fullscreen-nav next',onClick:e=>{e.stopPropagation();navFullscreen(1)}},'›'));
    bg.appendChild(el('div',{className:'fullscreen-label'},`${fc.cut.label}${fc.cut.angle?' · '+fc.cut.angle:''}${fc.cut.duration?' · '+fc.cut.duration:''}`));
    
    app.appendChild(bg);
  }
}

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(fullscreenCut===null)return;
  if(e.key==='Escape')closeFullscreen();
  else if(e.key==='ArrowLeft')navFullscreen(-1);
  else if(e.key==='ArrowRight')navFullscreen(1);
});

// ─── INIT ───
async function init(){await idbOpen();loadProject();render();loadGapi();loadGis()}
init();
</script>
</body>
</html>
